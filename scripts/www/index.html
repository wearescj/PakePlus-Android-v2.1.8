<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二维码替换工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 30px; font-size: 28px; }
        .upload-section { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .upload-box {
            flex: 1; min-width: 250px; border: 2px dashed #e0e0e0; border-radius: 12px; padding: 20px;
            text-align: center; cursor: pointer;
        }
        .upload-box.has-image { border-style: solid; border-color: #667eea; }
        .upload-box input { display: none; }
        .upload-box label { cursor: pointer; display: block; }
        .preview-image { max-width: 100%; max-height: 200px; margin-top: 10px; border-radius: 8px; }
        .canvas-section { display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; }
        .canvas-box {
            flex: 1; min-width: 300px; border: 2px solid #e0e0e0; border-radius: 12px;
            padding: 20px; text-align: center;
        }
        canvas { max-width: 100%; height: auto; border-radius: 8px; display: block; margin: 0 auto; }
        .result-img { max-width: 100%; margin-top: 10px; border-radius: 8px; display: none; }
        .button-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        button {
            padding: 14px 30px; font-size: 16px; font-weight: 600; color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none; border-radius: 12px; cursor: pointer;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .instructions { background: #f8f9fa; border-radius: 12px; padding: 20px; margin-bottom: 30px; }
        .instructions ol { margin-left: 20px; line-height: 1.8; }
        .size-control { margin-top: 20px; }
        .size-buttons { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .size-btn { padding: 8px 20px; font-size: 18px; }
        .save-hint { margin-top: 10px; color: #666; font-size: 14px; display: none; }
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { padding: 20px; }
            .upload-box, .canvas-box { min-width: 100%; }
            .button-group { flex-direction: column; }
            button { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>二维码替换工具</h1>
        <div class="instructions">
            <ol>
                <li>上传图片A（包含二维码的原图）</li>
                <li>上传图片B（新的二维码图片）</li>
                <li>用手指或鼠标拖动红色框到二维码位置</li>
                <li>用+/-按钮调整框的大小</li>
                <li>点击"替换二维码"按钮</li>
                <li>长按下方结果图片保存到手机</li>
            </ol>
        </div>
        <div class="upload-section">
            <div class="upload-box" id="uploadBoxA">
                <label for="imageInputA">
                    <div style="font-size: 40px;">📷</div>
                    <p>上传图片A（原图）</p>
                    <input type="file" id="imageInputA" accept="image/*">
                </label>
            </div>
            <div class="upload-box" id="uploadBoxB">
                <label for="imageInputB">
                    <div style="font-size: 40px;">📷</div>
                    <p>上传图片B（新二维码）</p>
                    <input type="file" id="imageInputB" accept="image/*">
                </label>
            </div>
        </div>
        <div class="canvas-section">
            <div class="canvas-box">
                <h3>图片A</h3>
                <canvas id="canvasA"></canvas>
                <div class="size-control" id="sizeControl" style="display: none;">
                    <p>调整框大小</p>
                    <div class="size-buttons">
                        <button class="size-btn" onclick="changeSize(-20)">-</button>
                        <button class="size-btn" onclick="changeSize(20)">+</button>
                    </div>
                </div>
            </div>
            <div class="canvas-box">
                <h3>结果图片C</h3>
                <canvas id="canvasC"></canvas>
                <img id="resultImage" class="result-img" alt="结果图片（长按保存）">
                <p class="save-hint" id="saveHint">💡 长按上方图片可保存到手机</p>
            </div>
        </div>
        <div class="button-group">
            <button id="replaceBtn" disabled>替换二维码</button>
            <button id="resetBtn">重置</button>
        </div>
    </div>

    <script>
        const imageInputA = document.getElementById('imageInputA');
        const imageInputB = document.getElementById('imageInputB');
        const uploadBoxA = document.getElementById('uploadBoxA');
        const uploadBoxB = document.getElementById('uploadBoxB');
        const canvasA = document.getElementById('canvasA');
        const canvasC = document.getElementById('canvasC');
        const ctxA = canvasA.getContext('2d');
        const ctxC = canvasC.getContext('2d');
        const replaceBtn = document.getElementById('replaceBtn');
        const resetBtn = document.getElementById('resetBtn');
        const sizeControl = document.getElementById('sizeControl');
        const resultImage = document.getElementById('resultImage');
        const saveHint = document.getElementById('saveHint');

        let imgA = null;
        let imgB = null;
        let selection = { x: 50, y: 50, width: 200, height: 200 };
        let isDragging = false;
        let dragOffsetX = 0;
        let dragOffsetY = 0;
        let displayScale = 1;

        function getEventCoords(e) {
            if (e.touches && e.touches.length > 0) {
                return { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
            return { x: e.clientX, y: e.clientY };
        }

        function redrawCanvasA() {
            if (!imgA) return;
            ctxA.drawImage(imgA, 0, 0, canvasA.width, canvasA.height);
            
            ctxA.strokeStyle = '#ff4444';
            ctxA.lineWidth = 4;
            ctxA.setLineDash([10, 5]);
            ctxA.strokeRect(selection.x, selection.y, selection.width, selection.height);
            ctxA.setLineDash([]);
            ctxA.fillStyle = 'rgba(255, 68, 68, 0.15)';
            ctxA.fillRect(selection.x, selection.y, selection.width, selection.height);
        }

        function handleImageAChange(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imgA = new Image();
                    imgA.onload = function() {
                        canvasA.width = imgA.width;
                        canvasA.height = imgA.height;
                        canvasC.width = imgA.width;
                        canvasC.height = imgA.height;
                        
                        selection = { 
                            x: imgA.width * 0.1, 
                            y: imgA.height * 0.1, 
                            width: Math.min(200, imgA.width * 0.3), 
                            height: Math.min(200, imgA.height * 0.3) 
                        };
                        
                        redrawCanvasA();
                        ctxC.drawImage(imgA, 0, 0);
                        
                        uploadBoxA.classList.add('has-image');
                        uploadBoxA.innerHTML = '<label for="imageInputA"><div style="font-size: 40px;">✅</div><p>图片A已上传</p><img src="' + event.target.result + '" class="preview-image" alt="预览"><input type="file" id="imageInputA" accept="image/*"></label>';
                        document.getElementById('imageInputA').addEventListener('change', handleImageAChange);
                        
                        sizeControl.style.display = 'block';
                        checkEnableButtons();
                    };
                    imgA.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        function handleImageBChange(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    imgB = new Image();
                    imgB.onload = function() {
                        uploadBoxB.classList.add('has-image');
                        uploadBoxB.innerHTML = '<label for="imageInputB"><div style="font-size: 40px;">✅</div><p>图片B已上传</p><img src="' + event.target.result + '" class="preview-image" alt="预览"><input type="file" id="imageInputB" accept="image/*"></label>';
                        document.getElementById('imageInputB').addEventListener('change', handleImageBChange);
                        checkEnableButtons();
                    };
                    imgB.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        }

        imageInputA.addEventListener('change', handleImageAChange);
        imageInputB.addEventListener('change', handleImageBChange);

        function isInSelection(x, y) {
            return x >= selection.x && x <= selection.x + selection.width &&
                   y >= selection.y && y <= selection.y + selection.height;
        }

        function handleStart(e) {
            if (!imgA) return;
            e.preventDefault();
            
            const rect = canvasA.getBoundingClientRect();
            displayScale = canvasA.width / rect.width;
            const coords = getEventCoords(e);
            const canvasX = (coords.x - rect.left) * displayScale;
            const canvasY = (coords.y - rect.top) * displayScale;
            
            if (isInSelection(canvasX, canvasY)) {
                isDragging = true;
                dragOffsetX = canvasX - selection.x;
                dragOffsetY = canvasY - selection.y;
            }
        }

        function handleMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            
            const rect = canvasA.getBoundingClientRect();
            const coords = getEventCoords(e);
            const canvasX = (coords.x - rect.left) * displayScale;
            const canvasY = (coords.y - rect.top) * displayScale;
            
            selection.x = canvasX - dragOffsetX;
            selection.y = canvasY - dragOffsetY;
            
            selection.x = Math.max(0, Math.min(selection.x, canvasA.width - selection.width));
            selection.y = Math.max(0, Math.min(selection.y, canvasA.height - selection.height));
            
            redrawCanvasA();
        }

        function handleEnd(e) {
            e.preventDefault();
            isDragging = false;
        }

        function changeSize(delta) {
            const newWidth = Math.max(50, Math.min(selection.width + delta, canvasA.width));
            const newHeight = Math.max(50, Math.min(selection.height + delta, canvasA.height));
            
            const centerX = selection.x + selection.width / 2;
            const centerY = selection.y + selection.height / 2;
            
            selection.width = newWidth;
            selection.height = newHeight;
            selection.x = centerX - newWidth / 2;
            selection.y = centerY - newHeight / 2;
            
            selection.x = Math.max(0, Math.min(selection.x, canvasA.width - selection.width));
            selection.y = Math.max(0, Math.min(selection.y, canvasA.height - selection.height));
            
            redrawCanvasA();
        }

        canvasA.addEventListener('mousedown', handleStart);
        canvasA.addEventListener('mousemove', handleMove);
        canvasA.addEventListener('mouseup', handleEnd);
        canvasA.addEventListener('mouseleave', handleEnd);

        canvasA.addEventListener('touchstart', handleStart, { passive: false });
        canvasA.addEventListener('touchmove', handleMove, { passive: false });
        canvasA.addEventListener('touchend', handleEnd, { passive: false });
        canvasA.addEventListener('touchcancel', handleEnd, { passive: false });

        function checkEnableButtons() {
            replaceBtn.disabled = !(imgA && imgB);
        }

        replaceBtn.addEventListener('click', function() {
            if (!imgA || !imgB) return;
            ctxC.drawImage(imgA, 0, 0);
            ctxC.drawImage(imgB, selection.x, selection.y, selection.width, selection.height);
            
            const dataUrl = canvasC.toDataURL('image/png');
            resultImage.src = dataUrl;
            resultImage.style.display = 'block';
            saveHint.style.display = 'block';
        });

        resetBtn.addEventListener('click', function() {
            imgA = null;
            imgB = null;
            selection = { x: 50, y: 50, width: 200, height: 200 };
            isDragging = false;
            
            uploadBoxA.classList.remove('has-image');
            uploadBoxA.innerHTML = '<label for="imageInputA"><div style="font-size: 40px;">📷</div><p>上传图片A（原图）</p><input type="file" id="imageInputA" accept="image/*"></label>';
            document.getElementById('imageInputA').addEventListener('change', handleImageAChange);
            
            uploadBoxB.classList.remove('has-image');
            uploadBoxB.innerHTML = '<label for="imageInputB"><div style="font-size: 40px;">📷</div><p>上传图片B（新二维码）</p><input type="file" id="imageInputB" accept="image/*"></label>';
            document.getElementById('imageInputB').addEventListener('change', handleImageBChange);
            
            ctxA.clearRect(0, 0, canvasA.width, canvasA.height);
            ctxC.clearRect(0, 0, canvasC.width, canvasC.height);
            resultImage.style.display = 'none';
            resultImage.src = '';
            saveHint.style.display = 'none';
            sizeControl.style.display = 'none';
            replaceBtn.disabled = true;
        });
    </script>
</body>
</html>
